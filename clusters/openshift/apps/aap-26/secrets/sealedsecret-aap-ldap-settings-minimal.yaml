apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: aap-ldap-settings-minimal
  namespace: aap
  annotations:
    # Sync before the AAP CR so the controller can read it on first install.
    argocd.argoproj.io/sync-wave: "1"
spec:
  encryptedData:
    # Run kubeseal to generate this value:
    #   echo -n '<ldap-bind-password>' \
    #     | kubeseal --raw --from-file=/dev/stdin \
    #         --namespace aap \
    #         --name aap-ldap-settings-minimal
    AUTH_LDAP_BIND_PASSWORD: AgReplaceThisWithKubesealOutput
  template:
    metadata:
      name: aap-ldap-settings-minimal
      namespace: aap
    type: Opaque
