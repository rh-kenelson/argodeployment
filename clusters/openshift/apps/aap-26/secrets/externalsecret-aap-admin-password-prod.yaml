apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: aap-admin-password-prod
  namespace: aap
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: your-secret-store
  target:
    name: aap-admin-password-prod
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: aap/prod/admin
        property: password
